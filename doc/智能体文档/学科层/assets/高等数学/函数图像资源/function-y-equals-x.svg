<svg xmlns="http://www.w3.org/2000/svg" width="960" height="700" viewBox="0 0 960 700" role="img" aria-labelledby="title desc">
  <title id="title">函数图像示例：y = x</title>
  <desc id="desc">一条经过原点的直线，表示输入变大时输出也同步变大。</desc>
  <rect width="960" height="700" fill="#fcfcfa"/>
  <rect x="70" y="70" width="820" height="470" rx="18" fill="#ffffff" stroke="#d8d8d8"/>
  <g stroke="#ececec" stroke-width="1">
    <line x1="150" y1="110" x2="150" y2="500"/>
    <line x1="230" y1="110" x2="230" y2="500"/>
    <line x1="310" y1="110" x2="310" y2="500"/>
    <line x1="390" y1="110" x2="390" y2="500"/>
    <line x1="470" y1="110" x2="470" y2="500"/>
    <line x1="550" y1="110" x2="550" y2="500"/>
    <line x1="630" y1="110" x2="630" y2="500"/>
    <line x1="710" y1="110" x2="710" y2="500"/>
    <line x1="790" y1="110" x2="790" y2="500"/>
    <line x1="110" y1="150" x2="850" y2="150"/>
    <line x1="110" y1="230" x2="850" y2="230"/>
    <line x1="110" y1="310" x2="850" y2="310"/>
    <line x1="110" y1="390" x2="850" y2="390"/>
    <line x1="110" y1="470" x2="850" y2="470"/>
  </g>
  <g stroke="#4f4f4f" stroke-width="2.5">
    <line x1="110" y1="310" x2="850" y2="310"/>
    <line x1="470" y1="500" x2="470" y2="110"/>
  </g>
  <g fill="#4f4f4f" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20">
    <text x="860" y="317">横轴 x</text>
    <text x="488" y="105">纵轴 y</text>
    <text x="448" y="334">0</text>
  </g>
  <polyline fill="none" stroke="#1f5aa6" stroke-width="6" points="150,470 230,390 310,310 390,230 470,150 550,70" transform="translate(0,80)"/>
  <g fill="#d94841">
    <circle cx="310" cy="390" r="7"/>
    <circle cx="470" cy="310" r="7"/>
    <circle cx="630" cy="230" r="7"/>
  </g>
  <g fill="#222222" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22">
    <text x="110" y="42">函数图像：y = x</text>
    <text x="280" y="42" fill="#5b5b5b">输入变大，输出也同步变大</text>
    <text x="290" y="565">点 A：(-2, -2)</text>
    <text x="465" y="565">点 B：(0, 0)</text>
    <text x="635" y="565">点 C：(2, 2)</text>
  </g>
  <rect x="110" y="630" width="740" height="34" rx="10" fill="#f6efdc" stroke="#d9c8a0"/>
  <text x="130" y="653" fill="#5a4b1f" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20">读图提示：图像从左下走向右上，说明输入越大，输出也越大。</text>
</svg>
