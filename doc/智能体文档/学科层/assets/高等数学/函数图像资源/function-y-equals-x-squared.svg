<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">函数图像示例：y = x^2</title>
  <desc id="desc">一条开口向上的抛物线，关于 y 轴对称，最低点在原点。</desc>
  <rect width="960" height="640" fill="#fcfcfa"/>
  <rect x="70" y="70" width="820" height="470" rx="18" fill="#ffffff" stroke="#d8d8d8"/>
  <g stroke="#ececec" stroke-width="1">
    <line x1="150" y1="110" x2="150" y2="500"/>
    <line x1="230" y1="110" x2="230" y2="500"/>
    <line x1="310" y1="110" x2="310" y2="500"/>
    <line x1="390" y1="110" x2="390" y2="500"/>
    <line x1="470" y1="110" x2="470" y2="500"/>
    <line x1="550" y1="110" x2="550" y2="500"/>
    <line x1="630" y1="110" x2="630" y2="500"/>
    <line x1="710" y1="110" x2="710" y2="500"/>
    <line x1="790" y1="110" x2="790" y2="500"/>
    <line x1="110" y1="150" x2="850" y2="150"/>
    <line x1="110" y1="230" x2="850" y2="230"/>
    <line x1="110" y1="310" x2="850" y2="310"/>
    <line x1="110" y1="390" x2="850" y2="390"/>
    <line x1="110" y1="470" x2="850" y2="470"/>
  </g>
  <g stroke="#4f4f4f" stroke-width="2.5">
    <line x1="110" y1="470" x2="850" y2="470"/>
    <line x1="470" y1="500" x2="470" y2="110"/>
  </g>
  <g fill="#4f4f4f" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20">
    <text x="860" y="477">横轴 x</text>
    <text x="488" y="105">纵轴 y</text>
    <text x="448" y="494">0</text>
  </g>
  <path d="M190 130 C250 250, 330 390, 470 470 C610 390, 690 250, 750 130" fill="none" stroke="#1f5aa6" stroke-width="6"/>
  <g fill="#d94841">
    <circle cx="310" cy="310" r="7"/>
    <circle cx="470" cy="470" r="7"/>
    <circle cx="630" cy="310" r="7"/>
  </g>
  <g fill="#222222" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="22">
    <text x="110" y="42">函数图像：y = x^2</text>
    <text x="300" y="42" fill="#5b5b5b">左右对称，开口向上，原点最低</text>
    <text x="270" y="565">点 A：(-2, 4)</text>
    <text x="435" y="565">点 B：(0, 0)</text>
    <text x="600" y="565">点 C：(2, 4)</text>
  </g>
  <line x1="470" y1="110" x2="470" y2="500" stroke="#a0a0a0" stroke-dasharray="8 8"/>
  <rect x="110" y="585" width="740" height="34" rx="10" fill="#f6efdc" stroke="#d9c8a0"/>
  <text x="130" y="608" fill="#5a4b1f" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="20">读图提示：图像关于 y 轴对称，中间最低，越往两边函数值越大。</text>
</svg>
