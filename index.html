<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI主导学习生命周期的自进化自学智能体平台</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="AI主导学习生命周期的自进化自学智能体平台比赛作品文档站，统一承载学习地图、闯关学习、画像笔记、知识进化与答辩交付文档。"
    />
    <script>
      (function () {
        const redirectKey = 'p';
        const basePath = '/doc-showcase';
        const params = new URLSearchParams(window.location.search);
        const redirectPath = params.get(redirectKey);

        if (!redirectPath) {
          return;
        }

        const normalizedPath = decodeURIComponent(redirectPath);
        const nextPath = normalizedPath.startsWith('/') ? normalizedPath : `/${normalizedPath}`;
        window.history.replaceState(null, '', `${basePath}${nextPath}`);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
