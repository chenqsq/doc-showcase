  last_updated_at: "2026-03-21T17:46:00+08:00"
  task_id_rule:
    mode: "AUTO_BY_CODEX"
    internal_task_id_pattern: "AUTO-{checkpoint_id}-{NN}"
    example: "AUTO-CP-20260321-1724-04-01"
    optional_user_fields:
      - "platform_run_id"
      - "remark"
    id_source_values:
      - "auto"
      - "platform"

enums:
  task_status:
    - BACKLOG
    - READY
    - DOING
    - WAIT_USER
    - BLOCKED
    - VERIFYING
    - DONE
  ac_status:
    - UNTESTED
    - PASS
    - FAIL
    - WAIVED

progress_rule:
  milestones:
    - STRATEGY
    - CONFIGURATION
    - INTEGRATION
    - EVIDENCE
    - ACCEPTANCE
    - DEMO
  formula: "progress = (milestone_done / 6) * 100"
  kickoff_baseline_for_ready: 5

state_transition:
  default_flow:
    - READY
    - DOING
    - VERIFYING
    - DONE
  on_block: "BLOCKED"
  on_missing_evidence: "WAIT_USER"
  rule: "NO_CORE_EVIDENCE_NO_VERIFY_NO_DONE"
  required_user_evidence_fields:
    - page_path
    - config_change
    - result
    - error_or_code
    - screenshot

